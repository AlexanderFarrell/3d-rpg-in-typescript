name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            script: build:desktop:linux
          - os: windows-latest
            platform: win
            script: build:desktop:win
          - os: macos-latest
            platform: mac
            script: build:desktop:mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }} -w game

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            game/release/*.AppImage
            game/release/*.exe
            game/release/*.dmg
          if-no-files-found: warn
